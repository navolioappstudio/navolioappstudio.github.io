<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Pagina non trovata — Navolio App Studio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0c10;--bg2:#111318;--border:#1e2530;--text:#edf2f7;--muted:#7a8694;--gold:#fbbf24;--radius:14px;}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
nav{background:rgba(10,12,16,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 clamp(20px,5vw,80px);height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);font-weight:700;font-size:16px;}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#fbbf24,#e67e22);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.error-wrap{max-width:480px;}
.error-code{font-size:120px;font-weight:900;color:var(--bg2);line-height:1;margin-bottom:16px;letter-spacing:-4px;}
.error-icon{font-size:56px;margin-bottom:20px;}
h1{font-size:26px;font-weight:800;margin-bottom:12px;}
p{font-size:16px;color:var(--muted);margin-bottom:32px;}
.btn-home{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#fbbf24,#e67e22);color:#0a0c10;font-size:15px;font-weight:700;padding:14px 28px;border-radius:12px;text-decoration:none;transition:opacity .2s;}
.btn-home:hover{opacity:.9;}
footer{text-align:center;padding:24px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;}
a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">⚡</div>
    Navolio App Studio
  </a>
</nav>

<main>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <div class="error-icon">🧱</div>
    <h1>Pagina non trovata</h1>
    <p>Il mattoncino che cercavi non è qui. Forse è in costruzione, o hai digitato un URL sbagliato.</p>
    <a href="/" class="btn-home">← Torna alla home</a>
  </div>
</main>

<footer>© 2026 Navolio App Studio · Michele Navolio · <a href="/">navolioappstudio.github.io</a></footer>
</body>
</html>
